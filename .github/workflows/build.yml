name: Build

on:
  pull_request:
  push:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
      
      - name: Cache xmake dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/.xmake
          key: xmake-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-

      - name: Update xmake repository
        run: xmake repo -u

      - name: Configure xmake (Client Only)
        # 去除了 --target_type 参数，因为 xmake.lua 已经硬编码为纯客户端模式
        run: xmake f -a x64 -m release -p windows -y

      - name: Build
        run: xmake

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-client-windows-x64
          path: bin/
