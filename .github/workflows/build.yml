name: Build

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build-12610:
    name: Build for 1.26.10.04
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
      
      - name: Cache xmake dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/.xmake
          key: xmake-12610-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-12610-

      - name: Update xmake repository
        run: xmake repo -u

      - name: Configure xmake (1.26.10.04)
        run: xmake f -a x64 -m release -p windows -y --levilamina_ver="26.10.14"

      - name: Build
        run: xmake

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChiyanMap-1.26.10.04
          path: bin/

  build-12620:
